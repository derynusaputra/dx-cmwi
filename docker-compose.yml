services:
  backend:
    build:
      context: ./be-cmwi
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      APP_PORT: 8080
      CORS_ORIGINS: "${APP_URL},https://${APP_DOMAIN},https://${APP_DOMAIN}:${NGINX_PORT},https://${SERVER_IP},https://${SERVER_IP}:${NGINX_PORT},https://localhost,https://localhost:${NGINX_PORT}"
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ./fe-cmwi
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "${APP_URL}"
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "${NGINX_PORT:-443}:443"
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro

volumes:
  uploads:
